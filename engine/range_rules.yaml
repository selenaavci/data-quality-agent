# Range validation rules configuration
# Each rule matches column names by keywords and applies min/max constraints.
# Statistical outlier detection (IQR) is always active for numerical columns.
#
# Format:
#   - keywords: list of substrings to match against lowercase column name
#     min: minimum allowed value (optional)
#     max: maximum allowed value (optional)
#     label: human-readable rule name

rules:
  - keywords: ["age", "yas", "yaş"]
    min: 0
    max: 150
    label: "Yaş aralığı"

  - keywords: ["percent", "yüzde", "oran", "rate", "ratio"]
    min: 0
    max: 100
    label: "Yüzde aralığı"

  - keywords: ["price", "fiyat", "tutar", "amount", "ucret", "ücret", "maliyet"]
    min: 0
    label: "Fiyat/tutar negatif olamaz"

  - keywords: ["quantity", "adet", "miktar", "stok", "count"]
    min: 0
    label: "Miktar negatif olamaz"

  - keywords: ["weight", "agirlik", "ağırlık", "kilo"]
    min: 0
    label: "Ağırlık negatif olamaz"

  - keywords: ["height", "boy", "uzunluk"]
    min: 0
    label: "Boy/uzunluk negatif olamaz"

  - keywords: ["temperature", "sicaklik", "sıcaklık"]
    min: -273.15
    label: "Mutlak sıfırın altı olamaz"

  - keywords: ["latitude", "enlem", "lat"]
    min: -90
    max: 90
    label: "Enlem aralığı"

  - keywords: ["longitude", "boylam", "lon", "lng"]
    min: -180
    max: 180
    label: "Boylam aralığı"
